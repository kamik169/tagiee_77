<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TAGIE77 | info </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<img class="custom-bg" id="bgImage" src="Julien Douvier.gif" alt="background" style="object-fit: cover; width:100%; height:100%;">
<div class="overlay-dark"></div>

<div class="main-card">
  <div class="avatar-section">
    <img class="avatar-img" id="avatarImage" src="anime.jpg" alt="avatar" 
         onerror="this.src='https://cdn-icons-png.flaticon.com/512/3884/3884956.png'">
    <div class="nickname">tagiee77</div>
    <div class="rp-status">🏆 tagiee77 info</div>
  </div>

  <div class="links-grid">
    <a href="https://www.twitch.tv/svager192" target="_blank" class="social-btn">
      <span class="social-icon">📺</span> Twitch.tv/svager192
    </a>
    <a href="https://t.me/tagiee77" target="_blank" class="social-btn">
      <span class="social-icon">💬</span> Telegram / tagiee77
    </a>
    <a href="https://www.youtube.com/@tagiee77" target="_blank" class="social-btn">
      <span class="social-icon">🎬</span> YouTube @tagiee77
    </a>
  </div>

  <div class="music-player">
    <div class="track-info">
      <span class="track-name" id="trackLabel">🎵 Ах Одесса - Hoodtrap Remix</span>
    </div>

    <div class="progress-container" id="progressBarContainer">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="time-row">
      <span id="currentTime">0:00</span>
      <span id="durationTime">0:00</span>
    </div>

    <div class="controls-row">
      <button class="play-pause-btn" id="playPauseBtn">▶</button>
      <div class="volume-wrap">
        <span>🔊</span>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
      </div>
    </div>

    
  <div class="footer-note">
    🔥 tagiee77 🔥
  </div>
</div>

<script>
  const audio = new Audio();
  let isPlaying = false;
  let progressInterval = null;

  const playPauseBtn = document.getElementById('playPauseBtn');
  const progressFill = document.getElementById('progressFill');
  const progressContainer = document.getElementById('progressBarContainer');
  const currentTimeSpan = document.getElementById('currentTime');
  const durationSpan = document.getElementById('durationTime');
  const volumeSlider = document.getElementById('volumeSlider');
  const audioUpload = document.getElementById('audioUpload');
  const trackLabel = document.getElementById('trackLabel');

  audio.src = "Ах Одесса - Hoodtrap Remix.mp3";
  audio.preload = "auto";
  audio.volume = 0.7;

  function formatTime(seconds) {
    if (isNaN(seconds) || seconds === undefined || seconds === Infinity) return "0:00";
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs < 10 ? '0' + secs : secs}`;
  }

  function updateProgress() {
    if (!isNaN(audio.duration) && audio.duration !== Infinity && audio.duration > 0) {
      const percent = (audio.currentTime / audio.duration) * 100;
      progressFill.style.width = percent + '%';
      currentTimeSpan.innerText = formatTime(audio.currentTime);
      durationSpan.innerText = formatTime(audio.duration);
    }
  }

  function startProgressInterval() {
    if (progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (isPlaying && !audio.paused) {
        updateProgress();
      }
    }, 150);
  }

  function stopProgressInterval() {
    if (progressInterval) {
      clearInterval(progressInterval);
      progressInterval = null;
    }
  }

  function togglePlay() {
    if (!audio.src || audio.src === '' || audio.src === window.location.href) {
      alert("Файл не знайдено. Завантажте музику через кнопку.");
      return;
    }

    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      playPauseBtn.innerHTML = '▶';
    } else {
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.then(() => {
          isPlaying = true;
          playPauseBtn.innerHTML = '⏸';
        }).catch(error => {
          console.warn("Помилка:", error);
          alert("Не вдалося відтворити трек.");
          isPlaying = false;
          playPauseBtn.innerHTML = '▶';
        });
      }
    }
  }

  function seek(e) {
    if (!audio.duration || isNaN(audio.duration) || audio.duration === Infinity) return;
    const rect = progressContainer.getBoundingClientRect();
    const clickX = e.clientX - rect.left;
    let percent = clickX / rect.width;
    if (percent > 1) percent = 1;
    if (percent < 0) percent = 0;
    audio.currentTime = percent * audio.duration;
    updateProgress();
  }

  function handleAudioUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    if (file.type.includes('audio')) {
      const objectURL = URL.createObjectURL(file);
      
      if (isPlaying) {
        audio.pause();
        isPlaying = false;
        playPauseBtn.innerHTML = '▶';
      }
      
      audio.src = objectURL;
      audio.load();
      audio.volume = volumeSlider.value;
      
      let fileName = file.name;
      if (fileName.length > 35) fileName = fileName.slice(0, 32) + '...';
      trackLabel.innerText = `🎵 ${fileName}`;
      
      audio.addEventListener('loadedmetadata', function onMeta() {
        durationSpan.innerText = formatTime(audio.duration);
        updateProgress();
        audio.removeEventListener('loadedmetadata', onMeta);
      });
      
      audio.play().then(() => {
        isPlaying = true;
        playPauseBtn.innerHTML = '⏸';
      }).catch(e => console.log("Автоплей заблоковано"));
    } else {
      alert("Оберіть MP3 файл");
    }
  }

  function setVolume() {
    audio.volume = volumeSlider.value;
  }

  playPauseBtn.addEventListener('click', togglePlay);
  progressContainer.addEventListener('click', seek);
  volumeSlider.addEventListener('input', setVolume);
  audioUpload.addEventListener('change', handleAudioUpload);

  audio.addEventListener('ended', () => {
    isPlaying = false;
    playPauseBtn.innerHTML = '▶';
    progressFill.style.width = '0%';
    currentTimeSpan.innerText = "0:00";
    updateProgress();
  });

  audio.addEventListener('loadedmetadata', () => {
    durationSpan.innerText = formatTime(audio.duration);
    updateProgress();
  });

  audio.addEventListener('error', () => {
    trackLabel.innerHTML = "⚠️ Трек не знайдено. Завантажте MP3";
  });

  startProgressInterval();
  updateProgress();
  
  if (audio.src && audio.src !== window.location.href) {
    audio.load();
  }
</script>
</body>
</html>
